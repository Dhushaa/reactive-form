<div style="padding: 30px; font-family: Arial, sans-serif; max-width: 800px; margin: 0 auto;">

  <!-- Toast Popup -->
  <div *ngIf="showPopup"
    style="position: fixed; top: 24px; left: 50%; transform: translateX(-50%); z-index: 9999; padding: 14px 24px; border-radius: 10px; font-size: 14px; font-weight: 600; color: white;"
    [style.background]="popupType === 'success' ? '#1b4332' : popupType === 'update' ? '#3880ff' : '#eb445a'">
    {{ popupMessage }}
  </div>

  <!-- View Popup -->
  <div *ngIf="showViewPopup"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; display: flex; align-items: center; justify-content: center;">
    <div style="background: white; border-radius: 16px; padding: 32px; width: 90%; max-width: 400px;">
      <h3 style="color: #1b4332; margin-bottom: 20px; text-align: center;">Product Details</h3>
      <div style="margin-bottom: 14px;">
        <label style="font-size: 12px; color: #888;">Product ID</label>
        <p style="font-size: 16px; font-weight: 600; color: #333; margin: 4px 0;">{{ viewProduct?.id }}</p>
      </div>
      <div style="margin-bottom: 14px;">
        <label style="font-size: 12px; color: #888;">Product Name</label>
        <p style="font-size: 16px; font-weight: 600; color: #333; margin: 4px 0;">{{ viewProduct?.name }}</p>
      </div>
      <div style="margin-bottom: 24px;">
        <label style="font-size: 12px; color: #888;">Price</label>
        <p style="font-size: 16px; font-weight: 600; color: #333; margin: 4px 0;">{{ viewProduct?.price }}</p>
      </div>
      <button (click)="closeView()"
        style="width: 100%; padding: 12px; background: #1b4332; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
        Close
      </button>
    </div>
  </div>

  <h2 style="color: #1b4332; margin-bottom: 20px;">Product Management</h2>

  <!-- Search Bar -->
  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <input [(ngModel)]="searchId" type="number" placeholder="Search by ID"
      style="padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; width: 200px;" />
    <button (click)="searchById()"
      style="background: #3880ff; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; cursor: pointer;">
      Search
    </button>
    <button (click)="clearSearch()"
      style="background: #888; color: white; border: none; padding: 10px 18px; border-radius: 8px; font-size: 14px; cursor: pointer;">
      Clear
    </button>
  </div>
  <p *ngIf="searchError" style="color: #eb445a; font-size: 13px; margin-bottom: 10px;">{{ searchError }}</p>

  <!-- Add New Button -->
  <button (click)="showForm = true; resetForm(); showForm = true"
    style="background: #1b4332; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 20px;">
    + Add New Product
  </button>

  <!-- Form -->
  <div *ngIf="showForm"
    style="background: #f9f9f9; border: 1px solid #d1d5db; border-radius: 12px; padding: 24px; margin-bottom: 24px;">
    <h3 style="color: #1b4332; margin-bottom: 16px;">{{ editId ? 'Edit Product' : 'Add Product' }}</h3>
    <div style="margin-bottom: 16px;">
      <label style="display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px;">Product Name</label>
      <input [(ngModel)]="name" type="text" placeholder="Enter product name"
        style="width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;" />
    </div>
    <div style="margin-bottom: 20px;">
      <label style="display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px;">Price</label>
      <input [(ngModel)]="price" type="number" placeholder="Enter price"
        style="width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; box-sizing: border-box;" />
    </div>
    <div style="display: flex; gap: 12px;">
      <button (click)="onSubmit()"
        style="flex: 1; padding: 11px; background: #1b4332; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
        {{ editId ? 'Update' : 'Save' }}
      </button>
      <button (click)="resetForm()"
        style="flex: 1; padding: 11px; background: #ffffff; color: #eb445a; border: 1.5px solid #eb445a; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;">
        Cancel
      </button>
    </div>
  </div>

  <!-- Product Table -->
  <table style="width: 100%; border-collapse: collapse;">
    <thead>
      <tr style="background: #1b4332; color: white;">
        <th style="padding: 12px; text-align: left;">#</th>
        <th style="padding: 12px; text-align: left;">Name</th>
        <th style="padding: 12px; text-align: left;">Price</th>
        <th style="padding: 12px; text-align: left;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of filteredProducts; let i = index"
        style="border-bottom: 1px solid #e5e7eb;">
        <td style="padding: 12px; color: #444;">{{ p.id }}</td>
        <td style="padding: 12px; color: #444;">{{ p.name }}</td>
        <td style="padding: 12px; color: #444;">{{ p.price }}</td>
        <td style="padding: 12px; display: flex; gap: 8px;">
          <button (click)="openView(p)"
            style="background: #1b4332; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;">
            View
          </button>
          <button (click)="editProduct(p)"
            style="background: #3880ff; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;">
            Edit
          </button>
          <button (click)="deleteProduct(p.id)"
            style="background: #eb445a; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;">
            Delete
          </button>
        </td>
      </tr>
      <tr *ngIf="filteredProducts.length === 0">
        <td colspan="4" style="padding: 20px; text-align: center; color: #888;">No products found</td>
      </tr>
    </tbody>
  </table>

</div>
